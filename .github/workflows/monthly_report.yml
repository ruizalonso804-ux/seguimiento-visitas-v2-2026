name: Reporte Mensual Carmencita

on:
  schedule:
    # Día 15 de cada mes a las 12:00 UTC (09:00 hora Chile)
    - cron: '0 12 15 * *'
    # Día 30 de cada mes a las 12:00 UTC (09:00 hora Chile)
    - cron: '0 12 30 * *'
  
  # Permite ejecutar manualmente desde GitHub
  workflow_dispatch:
    inputs:
      tipo_reporte:
        description: 'Tipo de reporte'
        required: true
        default: 'final'
        type: choice
        options:
          - corte15
          - final

jobs:
  enviar-reporte:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout código
      uses: actions/checkout@v3
    
    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install pandas requests python-dateutil plotly kaleido
    
    - name: Ejecutar reporte
      env:
        EMAIL_USER: ${{ secrets.EMAIL_USER }}
        EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
        SHEET_URL: ${{ secrets.SHEET_URL }}
      run: |
        if [ "${{ github.event.inputs.tipo_reporte }}" == "corte15" ]; then
          python email_sender.py --corte15
        else
          python email_sender.py
        fi
